prefix:
  server: "<gradient:aqua:blue>LastEngine <dark_gray>»"
  error: "<red>Ошибка <dark_gray>»"

general:
  no_permission: "%prefix_error% <red>У вас нет прав!"
  lang_changed: "%prefix_server% <green>Язык изменен на Русский!"
  player_only: "%prefix_error% <red>Только для игроков."
  player_not_found: "%prefix_error% <red>Игрок не найден."

lobby:
  board:
    title: "<gradient:gold:yellow><bold>LAST ENGINE"
    nickname: "<gray>Никнейм:"
    rank: "<gray>Ранг:"
    online: "<blue><bold>Онлайн:"
    footer: "<green>play.lastengine.net"
  tab:
    header: "\n<gradient:aqua:blue><bold>LAST ENGINE NETWORK</bold></gradient>\n<gray>Добро пожаловать, %player%!\n"
    footer: "\n<gray>Онлайн: <green>%online%\n\n<yellow>Сайт: <white>www.lastengine.net\n"

  # ПРЕДМЕТЫ В ИНВЕНТАРЕ (Хотбар)
  items:
    navigator:
      name: "<green><bold>Выбор режима"
      lore:
        - "<gray>Нажми ПКМ,"
        - "<gray>чтобы открыть меню!"

    profile:
      name: "<yellow><bold>Профиль"
      lore:
        - "<gray>Статистика и настройки"
        - ""
        - "<yellow>▶ Нажми, чтобы открыть"

    visibility:
      enabled:
        name: "<green><bold>Игроки: ВИДНЫ"
        lore:
          - "<gray>Нажми ПКМ, чтобы"
          - "<red>скрыть <gray>всех игроков."
      disabled:
        name: "<red><bold>Игроки: СКРЫТЫ"
        lore:
          - "<gray>Нажми ПКМ, чтобы"
          - "<green>показать <gray>всех игроков."

    parkour:
      name: "&aСлучайный Паркур"
      lore:
          - "&7Нажмите ПКМ, чтобы"
          - "&7начать испытание!"

  npc:
    bedwars:
      name: "<red><bold>BedWars"
      holo: "<gray>Онлайн: <green>%online%"
    vanilla:
      name: "<green><bold>Vanilla"
      holo: "<gray>Онлайн: <green>%online%"
    duels:
      name: "<yellow><bold>Duels"
      holo: "<gray>Скоро..."
    rewards:
      name: "<gold><bold>Награды"
      holo: "<yellow>Нажми для получения"

  rewards:
    title: "Ежедневные награды"

    items:
      # Формат названия дня
      day_name: "День %day%"

      # Статусы
      received_lore: "<gray>Уже получено!"

      current_name: "<gold><bold>День %day%"
      reward_header: "<yellow>Награда:"
      click_to_claim: "<green>▶ НАЖМИ, ЧТОБЫ ЗАБРАТЬ!"

      locked_name: "<red>День %day%"
      wait_header: "<gray>Следующая награда через:"
      wait_time: "<red>%time%"

      future_name: "<gray>День %day%"
      future_lore: "<gray>Будет доступно позже"

      # Описание наград
      reward_coins: "<gray>• <gold>%amount% монет"
      reward_emeralds: "<gray>• <green>%amount% изумрудов"

    messages:
      cooldown: "<red>Приходите позже! Осталось: %time%"
      received: "<green>Вы получили награду за День %day%!"
      received_coins: "<gold>+ %amount% монет"
      received_emeralds: "<green>+ %amount% изумрудов"

  # МЕНЮ ПРОФИЛЯ (GUI)
  profile_gui:
    title: "Профиль игрока"

    # Слот 13 - Голова (Основная инфа)
    info:
      name: "<green>Информация о персонаже"
      lore:
        - "<gray>Группа: %rank%"
        - "<gray>Уровень: <green>%level%"
        - ""
        - "<gray>Прогресс уровня:"
        - "%progressbar% <gray>(%exp% / %max_exp%)"
        - ""
        - "<gray>Монеты: <gold>%coins% ⛃"
        - "<gray>Изумруды: <green>%emeralds% 🟢"
        - ""
        - "<yellow>▶ Нажми для статистики"

    # Слот 29 - Настройки (Компаратор)
    settings:
      name: "<red>Настройки аккаунта"
      lore:
        - "<gray>Персонализация игрового"
        - "<gray>процесса и интерфейса."
        - ""
        - "<yellow>▶ Нажми, чтобы открыть"

    # Слот 31 - Косметика (Сундук)
    cosmetics:
      name: "<aqua>Косметика"
      lore:
        - "<gray>Преобразите свой внешний вид:"
        - "<gray>Гаджеты, Питомцы, Эффекты"
        - ""
        - "<yellow>▶ Нажми, чтобы открыть"

    # Слот 33 - Донат/Магазин (Изумруд)
    shop:
      name: "<green>Магазин"
      lore:
        - "<gray>Покупка привилегий"
        - "<gray>и игровой валюты."
        - ""
        - "<yellow>▶ Нажми, чтобы купить"

  # МЕНЮ ВЫБОРА РЕЖИМОВ (Компас)
  inventory:
    title: "Меню Сервера"
    bedwars:
      name: "<red>BedWars"
      lore:
        - "<gray>Классический режим."
        - ""
        - "<yellow>▶ Нажми, чтобы играть!"
    vanilla:
      name: "<green>Vanilla>"
      lore:
      - "<gray>Классическое выживание"
      - "<gray>Версия: <white>1.21"
      - ""
      - "<yellow>▶ Нажми, чтобы играть!"
    duels:
      name: "<yellow>Duels"
      lore:
        - "<gray>Сражения 1 на 1"
        - ""
        - "<yellow>Скоро..."

  messages:
    spawn_set: "%prefix_server% <green>Точка спавна установлена!"
    teleport: "%prefix_server% <gray>Телепортация..."
    visibility_hide: "<red>Все игроки скрыты!"
    visibility_show: "<green>Все игроки теперь видны!"

auth:
  messages:
    join:
      - "%prefix_server% <gray>Добро пожаловать!"
      - "<gray>Для игры необходимо авторизоваться."
      - "<yellow>Используйте Компас для выбора способа входа."
    code_sent: "%prefix_server% <green>Код подтверждения отправлен в %method%!"
    enter_code: "%prefix_server% <yellow>Введите код в чат или напишите: <gold>/code <12345>"
    success: "%prefix_server% <green>Вы успешно вошли!"
    wrong_code: "%prefix_error% <red>Неверный код! Попробуйте еще раз."
    timeout: "%prefix_error% <red>Время действия кода истекло."
    already: "%prefix_error% <red>Вы уже авторизованы."

  items:
    selector:
      name: "<green><bold>Меню Авторизации"
      lore:
        - "<gray>Нажми ПКМ,"
        - "<gray>чтобы выбрать метод входа"
        - "<gray>(Telegram или Почта)"

  gui:
    title: "<black>Выберите способ входа"
    telegram:
      name: "<blue><bold>Telegram"
      lore:
        - "<gray>Самый быстрый способ."
        - "<gray>Бот пришлет код в ЛС."
        - ""
        - "<yellow>▶ Нажми для выбора"
    email:
      name: "<gold><bold>Email (Почта)"
      lore:
        - "<gray>Код придет на почту."
        - "<gray>Безопасно и надежно."
        - ""
        - "<yellow>▶ Нажми для выбора"